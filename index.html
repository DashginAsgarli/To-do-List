<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TO-DO-LIST</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="all-container">
        <div class="container">
            <div class="box"></div>
            <h1>To-Do List</h1>
            <i class="bi bi-sort-down-alt  icon-1"></i>
            <div class="input-container">
                <input type="text" class="input" placeholder="Enter a new task...">
                <i class="bi bi-x-circle  clear"></i>
            </div>

            <div class="tasks-container"></div>
            <div class="footer-stats">
                <span id="items-left">0 items left</span>
                <div id="confirm-box" style="display: none;">
                    <span>Are you sure?</span>
                    <button id="yes-clear"
                        style="color: #ff4d4d; margin-left: 10px; background: none; border: none; cursor: pointer;">Yes</button>
                    <button id="no-clear"
                        style="color: white; margin-left: 5px; background: none; border: none; cursor: pointer;">No</button>
                </div>
                <button id="clear-all">Clear All</button>
            </div>
            <div class="pulus-add">
                <div class="pulus">+</div>
                <div class="add">Add</div>
            </div>
        </div>
    </div>
    <script src="app.js"></script>
</body>

</html>
